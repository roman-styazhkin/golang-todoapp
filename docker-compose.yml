services:
  todoapp:
    container_name: todoapp-main
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/api/Dockerfile
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - HTTP_ADDRESS=${HTTP_ADDRESS}
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - LOGGER_FOLDER=/app/out/logs
      - POSTGRES_HOST=todoapp-postgres
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: always

  todoapp-postgres:
    image: postgres:18.4-trixie
    container_name: todoapp-postgres-container
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  postgres-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: postgres-forwarder
    command: >
      TCP-LISTEN:5432,fork,reuseaddr
      TCP:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.25.8-alpine3.23
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code