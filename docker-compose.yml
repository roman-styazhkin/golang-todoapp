services:
  todoapp-postgres:
    image: postgres:18.4-trixie
    container_name: todoapp-postgres-container
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  postgres-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: postgres-forwarder
    command: >
      TCP-LISTEN:5432,fork,reuseaddr
      TCP:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"