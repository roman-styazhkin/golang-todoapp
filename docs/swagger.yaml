          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Получение пользователей
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Создание нового пользователя в системе
      parameters:
      - description: CreateUser тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданный пользователь
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.CreateUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Создание нового пользователя
      tags:
      - users
  /users/{id}:
    delete:
      description: Удаление существующего в системе пользователя
      parameters:
      - description: id удаляемого пользователя
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление пользователя
        "404":
          description: Пользователь с таким id не найден
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Удаление пользователя
      tags:
      - users
    get:
      description: Получение пользователя из системы
      parameters:
      - description: id получаемого пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Тело успешно полученного пользователя
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.GetUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "404":
          description: User with id not found
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Получение пользователя
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: |-
        Изменение существующего в системе пользователя
        #### Логика обновления полей (Three state logic):
        **1. Поле не передано** `phone_number is empty` игнорируется, значение phone_number в БД не меняется
        **2. Поле явно передано** `phone_number:+791112223344` значение phone_number меняется на новое в БД
        **3. Поле явно передано как null** `phone_number:null` значение phone_number меняется на null
        **Ограничения: ** full_name не может быть передан как null
        **Ограничения: ** full_name не может быть передан как "" (empty string)
        **Ограничения: ** phone_number не может быть передан как "" (empty string)
      parameters:
      - description: id изменяемого пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: PatchUser тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.PatchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешно измененный пользователь
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.PatchUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "409":
          description: Err conflict
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Изменение пользователя
      tags:
      - users
