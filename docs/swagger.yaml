paths:
  /statistics:
    get:
      description: Получение статистики по задачам
      parameters:
      - description: id пользователя с задачами
        in: query
        name: user_id
        type: integer
      - description: Начало промежутка рассмотрения статистики
        in: query
        name: from
        type: string
      - description: Конец промежутка рассмотрения статистики
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Статистика по задачам
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.StatisticsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server err
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Получение статистики
      tags:
      - statistics
  /tasks:
    get:
      description: Получение существующих в системе задач
      parameters:
      - description: Лимит получаемых задач
        in: query
        name: limit
        type: integer
      - description: id автора получаемых задач
        in: query
        name: user_id
        type: integer
      - description: Смещение получаемых задач
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение списка задач
          schema:
            items:
              $ref: '#/definitions/internal_features_tasks_transport_http.TaskDTO'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server err
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Получение задач
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Создание новой задачи в системе
      parameters:
      - description: Тело созданной задачи
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Успешно созданная задача
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "404":
          description: Author not found
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Создание новой задачи
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Удаление существующей в системе задачи
      parameters:
      - description: id удаляемой задачи
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление задачи
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server err
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Удаление задачи
      tags:
      - tasks
    get:
      description: Получение существующей в системе задачи
      parameters:
      - description: id получаемой задачи
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Тело получаемой задачи
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.GetTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server err
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Получение задачи
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: |-
        Изменение существующей в системе задачи
        #### Логика по изменению задачи (Three-stage-logic)
        **Title не задан** поле title никак не меняется в БД
        **Title явно задан как title: "value"** поле title меняется в БД на value
        **Description явно задан как description: null** поле description меняется в БД на null
        **Ограничения:** title и completed не могут быть null
        **Ограничения:** title и description не могут быть длиной меньше 1
      parameters:
      - description: id изменеямой задачи
        in: path
        name: id
        required: true
        type: integer
      - description: PatchTask тело задачи
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.PatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: PatchTask измененной задачи
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.PatchTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_roman-styazhkin_golang-todoapp_internal_core_transport_http_response.ErrResponse'
      summary: Изменение задачи
      tags:
      - tasks
  /users:
    get:
      description: Получение существующих в системе пользователей
      parameters:
      - description: Лимит получаемых пользователей
        in: query
        name: limit
        type: integer
      - description: Смещение получаемых пользователей
        in: query
        name: offset
        type: integer
      produces:
